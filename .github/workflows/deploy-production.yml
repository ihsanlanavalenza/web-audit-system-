name: Deploy Production (cPanel)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate_build_package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, xml, ctype, json, tokenizer, pdo, pdo_mysql

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run Test Suite
        run: php artisan test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Prepare Production Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Create Release Package
        run: |
          mkdir -p release
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='*.md' \
            --exclude='*.md.*' \
            --exclude='deploy/' \
            --exclude='storage/' \
            --exclude='release/' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ release/

          # Ensure writable runtime directories exist on first deployment.
          mkdir -p release/storage/app/public
          mkdir -p release/storage/framework/cache/data
          mkdir -p release/storage/framework/sessions
          mkdir -p release/storage/framework/testing
          mkdir -p release/storage/framework/views
          mkdir -p release/storage/logs
          mkdir -p release/bootstrap/cache

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release/

  deploy_ftp:
    runs-on: ubuntu-latest
    needs: validate_build_package
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release/

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ secrets.CPANEL_FTP_PORT != '' && secrets.CPANEL_FTP_PORT || 21 }}
          protocol: ${{ secrets.CPANEL_FTP_PROTOCOL != '' && secrets.CPANEL_FTP_PROTOCOL || 'ftp' }}
          local-dir: release/
          server-dir: ${{ endsWith(secrets.CPANEL_TARGET_DIR, '/') && secrets.CPANEL_TARGET_DIR || format('{0}/', secrets.CPANEL_TARGET_DIR) }}
          log-level: standard
          dangerous-clean-slate: false
