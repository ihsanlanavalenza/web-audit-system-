name: Deploy Production (cPanel)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate_build_package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, xml, ctype, json, tokenizer, pdo, pdo_mysql

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run Test Suite
        run: php artisan test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend Assets
        run: |
          npm ci
          npm run build

      - name: Prepare Production Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Create Release Package
        run: |
          mkdir -p release
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='docs/' \
            --exclude='*.md' \
            --exclude='*.md.*' \
            --exclude='deploy/' \
            --exclude='storage/' \
            --exclude='release/' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ release/

          # Ensure writable runtime directories exist on first deployment.
          mkdir -p release/storage/app/public
          mkdir -p release/storage/framework/cache/data
          mkdir -p release/storage/framework/sessions
          mkdir -p release/storage/framework/testing
          mkdir -p release/storage/framework/views
          mkdir -p release/storage/logs
          mkdir -p release/bootstrap/cache

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release/

  deploy_remote:
    runs-on: ubuntu-latest
    needs: validate_build_package
    if: github.ref == 'refs/heads/main'

    env:
      CPANEL_WEB_ROOT: ${{ endsWith(secrets.CPANEL_TARGET_DIR, '/') && secrets.CPANEL_TARGET_DIR || format('{0}/', secrets.CPANEL_TARGET_DIR) }}
      CPANEL_APP_DIR: ${{ secrets.CPANEL_APP_DIR != '' && (endsWith(secrets.CPANEL_APP_DIR, '/') && secrets.CPANEL_APP_DIR || format('{0}/', secrets.CPANEL_APP_DIR)) || format('/home/{0}/web-audit-system-/', secrets.CPANEL_FTP_USERNAME) }}
      CPANEL_SSH_PORT: ${{ secrets.CPANEL_SSH_PORT != '' && secrets.CPANEL_SSH_PORT || 22 }}

    steps:
      - name: Download Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release/

      - name: Normalize cPanel Host
        id: normalize_host
        run: |
          raw_host='${{ secrets.CPANEL_FTP_SERVER }}'
          raw_host="${raw_host#http://}"
          raw_host="${raw_host#https://}"
          raw_host="${raw_host#ftp://}"
          raw_host="${raw_host#ftps://}"
          raw_host="${raw_host%%/*}"
          raw_host="${raw_host%%:*}"

          if [ -z "$raw_host" ]; then
            echo "CPANEL_FTP_SERVER tidak valid. Isi dengan host/IP tanpa protocol." >&2
            exit 1
          fi

          echo "host=$raw_host" >> "$GITHUB_OUTPUT"

      - name: Upload Release via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ steps.normalize_host.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ env.CPANEL_SSH_PORT }}
          source: "release/*"
          target: ${{ env.CPANEL_APP_DIR }}
          strip_components: 1
          overwrite: true

      - name: Activate Release and Publish Web Root
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.normalize_host.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ env.CPANEL_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="${{ env.CPANEL_APP_DIR }}"
            WEB_ROOT="${{ env.CPANEL_WEB_ROOT }}"
            APP_DIR="${APP_DIR%/}"
            WEB_ROOT="${WEB_ROOT%/}"
            PHP_BIN="/opt/cpanel/ea-php82/root/usr/bin/php"
            if [ ! -x "$PHP_BIN" ]; then
              PHP_BIN="$(command -v php)"
            fi

            mkdir -p "$APP_DIR"
            mkdir -p "$WEB_ROOT"
            mkdir -p "$APP_DIR/storage/app/public"
            mkdir -p "$APP_DIR/storage/framework/cache/data"
            mkdir -p "$APP_DIR/storage/framework/sessions"
            mkdir -p "$APP_DIR/storage/framework/testing"
            mkdir -p "$APP_DIR/storage/framework/views"
            mkdir -p "$APP_DIR/storage/logs"
            mkdir -p "$APP_DIR/bootstrap/cache"
            chmod -R ug+rwX "$APP_DIR/storage" "$APP_DIR/bootstrap/cache" || true

            if [ ! -f "$APP_DIR/.env" ] && [ -f "$APP_DIR/.env.example" ]; then
              cp "$APP_DIR/.env.example" "$APP_DIR/.env"

              # First deployment fallback: force production-safe defaults.
              sed -i "s/^APP_ENV=.*/APP_ENV=production/" "$APP_DIR/.env"
              sed -i "s/^APP_DEBUG=.*/APP_DEBUG=false/" "$APP_DIR/.env"
              sed -i "s|^APP_URL=.*|APP_URL=https://auditin.my.id|" "$APP_DIR/.env"
              sed -i "s/^SESSION_DRIVER=.*/SESSION_DRIVER=file/" "$APP_DIR/.env"
              sed -i "s/^CACHE_STORE=.*/CACHE_STORE=file/" "$APP_DIR/.env"
              sed -i "s/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/" "$APP_DIR/.env"
            fi

            # SQLite fallback support for first-run environments.
            if [ -f "$APP_DIR/.env" ] && grep -Eq '^DB_CONNECTION=sqlite$' "$APP_DIR/.env"; then
              mkdir -p "$APP_DIR/database"
              touch "$APP_DIR/database/database.sqlite"
            fi

            if [ -d "$APP_DIR/public" ]; then
              if command -v rsync >/dev/null 2>&1; then
                rsync -a --delete --exclude='cgi-bin/' "$APP_DIR/public/" "$WEB_ROOT/"
              else
                cp -a "$APP_DIR/public/." "$WEB_ROOT/"
              fi
            fi

            cat > "$WEB_ROOT/.htaccess" <<HTACCESS
            <IfModule mime_module>
                AddHandler application/x-httpd-ea-php82 .php .php8 .phtml
            </IfModule>

            <IfModule mod_rewrite.c>
                <IfModule mod_negotiation.c>
                    Options -MultiViews -Indexes
                </IfModule>

                RewriteEngine On

                RewriteCond %{HTTP:Authorization} .
                RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

                RewriteCond %{REQUEST_FILENAME} !-d
                RewriteCond %{REQUEST_FILENAME} !-f
                RewriteRule ^ index.php [L]
            </IfModule>
            HTACCESS

            cat > "$WEB_ROOT/index.php" <<PHP
            <?php
            use Illuminate\\Foundation\\Application;

            define('LARAVEL_START', microtime(true));

            if (file_exists(\$maintenance = '${APP_DIR}/storage/framework/maintenance.php')) {
                require \$maintenance;
            }

            require '${APP_DIR}/vendor/autoload.php';

            \$app = require_once '${APP_DIR}/bootstrap/app.php';

            \$app->handleRequest(Illuminate\\Http\\Request::capture());
            PHP

            ln -sfn "${APP_DIR}/storage/app/public" "${WEB_ROOT}/storage"

            if [ -f "${APP_DIR}/.env" ]; then
              cd "$APP_DIR"

              if ! grep -Eq '^APP_KEY=base64:' .env; then
                "$PHP_BIN" artisan key:generate --force
              fi

              "$PHP_BIN" artisan migrate --force
              "$PHP_BIN" artisan optimize:clear
              "$PHP_BIN" artisan config:cache

              if ! "$PHP_BIN" artisan route:cache; then
                echo "route:cache skipped (closure routes detected)."
                "$PHP_BIN" artisan route:clear
              fi

              "$PHP_BIN" artisan view:cache
            else
              echo "WARNING: ${APP_DIR}/.env belum ada di server; lewati perintah artisan."
            fi
